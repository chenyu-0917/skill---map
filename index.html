<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="個人技術技能地圖">
    <meta name="keywords" content="技能地圖,技術成長,職涯規劃,軟體工程師">
    <title>技術技能地圖 - 個人成長工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2D5BFF;
            --primary-dark: #1E3FCC;
            --secondary: #00D9B5;
            --accent: #FF6B6B;
            --bg-main: #0A0E27;
            --bg-card: #151932;
            --bg-card-hover: #1D2341;
            --text-primary: #E8ECFF;
            --text-secondary: #8B93B8;
            --text-dim: #5A6488;
            --border: #252B4D;
            --success: #00D9B5;
            --warning: #FFB830;
            --beginner: #FF6B6B;
            --intermediate: #FFB830;
            --advanced: #00D9B5;
            --expert: #2D5BFF;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(45, 91, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 217, 181, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(45, 91, 255, 0.2);
            border-color: var(--primary);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .full-width {
            grid-column: 1;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 32px rgba(45, 91, 255, 0.15);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon {
            font-size: 1.8rem;
        }

        .radar-container {
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skills-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .skill-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .skill-category {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .skill-category:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            cursor: pointer;
            user-select: none;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .skill-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .skill-item:hover {
            background: rgba(45, 91, 255, 0.05);
            border-color: var(--primary);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-name {
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .expand-icon {
            font-size: 0.8rem;
            color: var(--text-dim);
            transition: transform 0.3s ease;
        }

        .skill-item.expanded .expand-icon {
            transform: rotate(90deg);
        }

        .skill-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease, margin-top 0.3s ease;
            opacity: 0;
        }

        .skill-item.expanded .skill-details {
            max-height: 500px;
            opacity: 1;
            margin-top: 12px;
        }

        .skill-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .learning-tips {
            margin-top: 8px;
            padding: 12px;
            background: rgba(0, 217, 181, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--secondary);
        }

        .learning-tips-title {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .learning-tips-content {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .skill-level {
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .level-beginner { background: rgba(255, 107, 107, 0.2); color: var(--beginner); }
        .level-intermediate { background: rgba(255, 184, 48, 0.2); color: var(--intermediate); }
        .level-advanced { background: rgba(0, 217, 181, 0.2); color: var(--advanced); }
        .level-expert { background: rgba(45, 91, 255, 0.2); color: var(--expert); }

        .skill-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-main);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 1s ease-out;
            position: relative;
            overflow: hidden;
        }

        .skill-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            to { left: 100%; }
        }

        .roadmap-section {
            animation: fadeInUp 0.8s ease-out 0.6s backwards;
        }

        .roadmap-timeline {
            position: relative;
            padding-left: 40px;
            margin-top: 30px;
        }

        .roadmap-timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }

        .roadmap-item {
            position: relative;
            margin-bottom: 32px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border-left: 3px solid var(--primary);
            transition: all 0.3s ease;
        }

        .roadmap-item:hover {
            background: rgba(45, 91, 255, 0.08);
            transform: translateX(4px);
        }

        .roadmap-item::before {
            content: '';
            position: absolute;
            left: -43px;
            top: 24px;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            border: 3px solid var(--bg-card);
            box-shadow: 0 0 0 4px var(--bg-main);
        }

        .roadmap-phase {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .roadmap-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .roadmap-description {
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .roadmap-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .roadmap-tag {
            padding: 6px 14px;
            background: rgba(45, 91, 255, 0.15);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(45, 91, 255, 0.3);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 968px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .radar-container {
                height: 400px;
            }

            .skills-list {
                grid-template-columns: 1fr;
            }
        }

        .interactive-note {
            background: rgba(0, 217, 181, 0.1);
            border: 1px solid var(--secondary);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: start;
            gap: 12px;
        }

        .note-icon {
            font-size: 1.2rem;
            color: var(--secondary);
            flex-shrink: 0;
        }
    </style>
</head>

    </div>

        // 成長路徑規劃
        const roadmapData = [
            {
                phase: "短期目標 (3-6個月)",

        // 計算統計數據
        function calculateStats() {
            let total = 0;
            let expert = 0;
            let advanced = 0;
            let growth = 0;

            Object.values(skillsData).forEach(category => {
                category.forEach(skill => {
                    total++;
                    if (skill.level === 'expert') expert++;
                    if (skill.level === 'advanced') advanced++;
                    if (skill.score < 60) growth++;
                });
            });

            document.getElementById('totalSkills').textContent = total;
            document.getElementById('expertSkills').textContent = expert;
            document.getElementById('advancedSkills').textContent = advanced;
            document.getElementById('growthAreas').textContent = growth;

            // 數字動畫
            animateValue('totalSkills', 0, total, 1000);
            animateValue('expertSkills', 0, expert, 1200);
            animateValue('advancedSkills', 0, advanced, 1400);
            animateValue('growthAreas', 0, growth, 1600);
        }

        function animateValue(id, start, end, duration) {
            const element = document.getElementById(id);
            const range = end - start;
            const increment = range / (duration / 16);
            let current = start;
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= end) {
                    element.textContent = end;
                    clearInterval(timer);
                } else {
                    element.textContent = Math.floor(current);
                }
            }, 16);
        }

        // 渲染技能列表
        function renderSkillsList() {
            const container = document.getElementById('skillsList');
            
            // 定義兩欄的類別分組
            const column1Categories = ['前端開發', '後端開發', '雲端技術', '系統分析與設計'];
            const column2Categories = ['開發工具與流程', '專案管理與溝通', '資訊安全', '領域知識'];
            
            // 創建第一欄
            const column1 = document.createElement('div');
            column1.className = 'skill-column';
            
            column1Categories.forEach(categoryName => {
                if (skillsData[categoryName]) {
                    const categoryDiv = createCategoryElement(categoryName, skillsData[categoryName]);
                    column1.appendChild(categoryDiv);
                }
            });
            
            // 創建第二欄
            const column2 = document.createElement('div');
            column2.className = 'skill-column';
            
            column2Categories.forEach(categoryName => {
                if (skillsData[categoryName]) {
                    const categoryDiv = createCategoryElement(categoryName, skillsData[categoryName]);
                    column2.appendChild(categoryDiv);
                }
            });
            
            container.appendChild(column1);
            container.appendChild(column2);

            // 觸發進度條動畫
            setTimeout(() => {
                document.querySelectorAll('.skill-progress').forEach(bar => {
                    bar.style.width = bar.dataset.width;
                });
            }, 100);
        }

        function createCategoryElement(category, skills) {
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'skill-category';
            
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerHTML = `<div class="category-title">${category}</div>`;
            categoryDiv.appendChild(header);
            
            skills.forEach(skill => {
                const skillDiv = document.createElement('div');
                skillDiv.className = 'skill-item';
                skillDiv.innerHTML = `
                    <div class="skill-header">
                        <span class="skill-name">
                            <span class="expand-icon">▶</span>
                            ${skill.name}
                        </span>
                        <span class="skill-level level-${skill.level}">${getLevelText(skill.level)}</span>
                    </div>
                    <div class="skill-bar">
                        <div class="skill-progress" style="width: 0%" data-width="${skill.score}%"></div>
                    </div>
                    <div class="skill-details">
                        <div class="skill-description">
                            ${skill.description}
                        </div>
                        ${skill.learningTips ? `
                            <div class="learning-tips">
                                <div class="learning-tips-title">
                                    💡 學習建議
                                </div>
                                <div class="learning-tips-content">
                                    ${skill.learningTips}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
                
                // 加入點擊事件
                skillDiv.addEventListener('click', function(e) {
                    // 如果點擊的是進度條區域，不展開
                    if (e.target.closest('.skill-bar')) return;
                    
                    this.classList.toggle('expanded');
                });
                
                categoryDiv.appendChild(skillDiv);
            });
            
            return categoryDiv;
        }

        function getLevelText(level) {
            const levels = {
                beginner: '初學',
                intermediate: '中階',
                advanced: '進階',
                expert: '專家'
            };
            return levels[level] || level;
        }

        // 渲染成長路徑
        function renderRoadmap() {
            const container = document.getElementById('roadmapTimeline');
            
            roadmapData.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'roadmap-item';
                itemDiv.style.animationDelay = `${index * 0.2}s`;
                
                itemDiv.innerHTML = `
                    <div class="roadmap-phase">${item.phase}</div>
                    <div class="roadmap-title">${item.title}</div>
                    <div class="roadmap-description">${item.description}</div>
                    <div class="roadmap-skills">
                        ${item.skills.map(skill => `<span class="roadmap-tag">${skill}</span>`).join('')}
                    </div>
                `;
                
                container.appendChild(itemDiv);
            });
        }

        // 建立雷達圖
        function createRadarChart() {
            const ctx = document.getElementById('skillRadar').getContext('2d');
            
            // 計算每個類別的平均分數
            const categories = Object.keys(skillsData);
            const scores = categories.map(category => {
                const categorySkills = skillsData[category];
                const avgScore = categorySkills.reduce((sum, skill) => sum + skill.score, 0) / categorySkills.length;
                return avgScore;
            });

            // 定義每個類別的目標能力(依照 skillsData 的順序)
            const categoryTargets = {
                "後端開發": 85,
                "前端開發": 80,
                "雲端技術": 75,
                "系統分析與設計": 80,
                "開發工具與流程": 75,
                "專案管理與溝通": 75,
                "資訊安全": 70,
                "領域知識": 85
            };

            const targetScores = categories.map(category => categoryTargets[category] || 75);

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: categories,
                    datasets: [{
                        label: '當前能力',
                        data: scores,
                        fill: true,
                        backgroundColor: 'rgba(45, 91, 255, 0.2)',
                        borderColor: 'rgba(45, 91, 255, 1)',
                        pointBackgroundColor: 'rgba(45, 91, 255, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(45, 91, 255, 1)',
                        borderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }, {
                        label: '目標能力',
                        data: targetScores,
                        fill: true,
                        backgroundColor: 'rgba(0, 217, 181, 0.1)',
                        borderColor: 'rgba(0, 217, 181, 1)',
                        pointBackgroundColor: 'rgba(0, 217, 181, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(0, 217, 181, 1)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20,
                                color: '#8B93B8',
                                backdropColor: 'transparent',
                                font: {
                                    size: 12,
                                    family: 'Noto Sans TC'
                                }
                            },
                            grid: {
                                color: 'rgba(139, 147, 184, 0.2)'
                            },
                            pointLabels: {
                                color: '#E8ECFF',
                                font: {
                                    size: 13,
                                    weight: '500',
                                    family: 'Noto Sans TC'
                                },
                                padding: 15
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#E8ECFF',
                                padding: 20,
                                font: {
                                    size: 13,
                                    family: 'Noto Sans TC'
                                },
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(21, 25, 50, 0.95)',
                            titleColor: '#E8ECFF',
                            bodyColor: '#8B93B8',
                            borderColor: '#2D5BFF',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + Math.round(context.parsed.r) + '分';
                                }
                            }
                        }
                    }
                }
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            calculateStats();
            renderSkillsList();
            renderRoadmap();
            createRadarChart();
        });
    </script>
